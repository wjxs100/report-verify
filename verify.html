<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房地产抵押估价报告查验</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 16px;
            padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            position: relative;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            color: #333;
            font-size: 20px;
            margin-bottom: 8px;
        }
        .header p {
            color: #888;
            font-size: 13px;
        }
        .verify-badge {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .info-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px 20px;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #666;
            font-size: 13px;
        }
        .info-value {
            color: #333;
            font-size: 13px;
            font-weight: 500;
            text-align: right;
            max-width: 60%;
            word-break: break-all;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        .footer p {
            color: #999;
            font-size: 11px;
        }
        .stamp {
            position: absolute;
            left: 50%;
            top: 340px;
            transform: translateX(-50%);
            width: 150px;
            height: 100px;
            opacity: 0.9;
            pointer-events: none;
        }
    </style>
</head>

<div class="container">
    <div class="header">
        <h1>📋 房地产抵押估价报告查验</h1>
        <p>扫码验证报告真伪</p>

            <span class="info-label">建筑面积</span>
            <span class="info-value" id="area">-</span>

        <div class="info-item">
            <span class="info-label">抵押价值</span>
            <span class="info-value" id="value">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">估价机构</span>
            <span class="info-value" id="agency">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">出具日期</span>
            <span class="info-value" id="date">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">估价师</span>
            <span class="info-value" id="appraiser">-</span>
        </div>
    </div>
