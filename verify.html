<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房地产抵押估价报告查验</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 16px;
            padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            color: #333;
            font-size: 20px;
            margin-bottom: 8px;
        }
        .header p {
            color: #888;
            font-size: 13px;
        }
        .verify-badge {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .info-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px 20px;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #666;
            font-size: 13px;
        }
        .info-value {
            color: #333;
            font-size: 13px;
            font-weight: 500;
            text-align: right;
            max-width: 60%;
            word-break: break-all;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        .footer p {
            color: #999;
            font-size: 11px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📋 房地产抵押估价报告查验</h1>
        <p>扫码验证报告真伪</p>
    </div>

    <div style="text-align: center;">
        <span class="verify-badge">✓ 报告有效</span>
    </div>

    <div class="info-card">
        <div class="info-item">
            <span class="info-label">报告编号</span>
            <span class="info-value" id="reportId">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">估价对象</span>
            <span class="info-value" id="address">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">权利人</span>
            <span class="info-value" id="owner">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">建筑面积</span>
            <span class="info-value" id="area">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">抵押价值</span>
            <span class="info-value" id="value">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">估价机构</span>
            <span class="info-value" id="agency">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">出具日期</span>
            <span class="info-value" id="date">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">估价师</span>
            <span class="info-value" id="appraiser">-</span>
        </div>
    </div>

    <div class="footer">
        <p>此页面仅供查验报告真伪使用</p>
        <p id="verifyTime"></p>
    </div>
</div>

<script>
    // 从URL参数获取报告信息
    function getUrlParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return decodeURIComponent(urlParams.get(name) || '-');
    }

    // 填充报告信息
    document.getElementById('reportId').textContent = getUrlParam('id');
    document.getElementById('address').textContent = getUrlParam('a');
    document.getElementById('owner').textContent = getUrlParam('o');
    document.getElementById('area').textContent = '-';
    document.getElementById('value').textContent = getUrlParam('v') + '元';
    document.getElementById('agency').textContent = '-';

    // 处理日期（格式：20260509 -> 二〇二六年五月九日）
    const dateNum = getUrlParam('t');
    if (dateNum && dateNum !== '-') {
        const y = dateNum.substring(0, 4);
        const m = parseInt(dateNum.substring(4, 6));
        const day = parseInt(dateNum.substring(6, 8));
        const yue = ['正','二','三','四','五','六','七','八','九','十','十一','十二'];
        const ri = ['','一','二','三','四','五','六','七','八','九','十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','二十一','二十二','二十三','二十四','二十五','二十六','二十七','二十八','二十九','三十','三十一'];
        const nian = '零一二三四五六七八九';
        const yc = '二〇' + y.slice(2).split('').map(d => nian[parseInt(d)]).join('');
        document.getElementById('date').textContent = yc + '年' + yue[m-1] + '月' + ri[day] + '日';
    } else {
        document.getElementById('date').textContent = '-';
    }
    document.getElementById('appraiser').textContent = '-';

    // 显示查验时间
    const now = new Date();
    document.getElementById('verifyTime').textContent = '查验时间：' + now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
</script>
</body>
</html>
